name: Build LabQC Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - 'backend/**'
      - 'run_labqc.py'
      - 'requirements.txt'
      - 'frontend/dist/**'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build frontend
        shell: pwsh
        run: |
          cd frontend
          npm install
          npx vite build --base=/
          cd ..

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onedir --name LabQC --console `
            --add-data "frontend/dist;frontend_dist" `
            --hidden-import "backend" `
            --hidden-import "backend.main" `
            --hidden-import "backend.db.database" `
            --hidden-import "backend.auth" `
            --hidden-import "backend.routers.auth" `
            --hidden-import "backend.routers.qc" `
            --hidden-import "backend.routers.sigma" `
            --hidden-import "backend.routers.validation" `
            --hidden-import "backend.routers.audit" `
            --hidden-import "backend.routers.lots" `
            --hidden-import "backend.routers.rag" `
            --hidden-import "backend.routers.eqa" `
            --hidden-import "backend.routers.lis" `
            --hidden-import "backend.routers.settings" `
            --hidden-import "backend.models.qc_models" `
            --hidden-import "backend.models.sigma_models" `
            --hidden-import "backend.models.validation_models" `
            --hidden-import "backend.models.audit_models" `
            --hidden-import "backend.models.lot_models" `
            --hidden-import "backend.models.eqa_models" `
            --hidden-import "backend.models.settings_models" `
            --hidden-import "backend.services.lis_parser" `
            run_labqc.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabQC_Windows_EXE
          path: dist/LabQC/
          retention-days: 7
